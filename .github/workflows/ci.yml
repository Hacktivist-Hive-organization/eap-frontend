name: React PR Checks

on:
  push:
    branches: [ 'main', 'dev' ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:coverage

      - name: Lint project
        run: npm run lint

      - name: Build project
        run: npm run build

  publish-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'   # publish only from main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=$(date +'%Y-%m-%d_%H-%M')-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_ID }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_ID }}/backend_fastapi:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_ID }}/eap-frontend:latest